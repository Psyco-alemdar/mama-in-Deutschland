<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mama in Deutschland - Kalender</title>
  <style>
    :root{
      --page:#f8f3ec;--card:#ffffff;--cream:#fffaf4;--soft:#f3eadf;--brown:#4a3428;--light:#9b7357;--text:#2f2621;--muted:#7b6a60;--border:#eadfd2;--danger:#b45b48;--success:#5f8d63;--shadow:rgba(74,52,40,.12)
    }
    body.theme-boy{--page:#eef7ff;--cream:#f7fbff;--soft:#e8f4ff;--brown:#244b6b;--light:#5f93bd;--text:#1d3347;--muted:#5c7285;--border:#d6e8f7;--shadow:rgba(36,75,107,.12)}
    body.theme-girl{--page:#fff1f5;--cream:#fff8fa;--soft:#fde8ef;--brown:#7a3d55;--light:#c47a98;--text:#3d2430;--muted:#7b6070;--border:#f0d4df;--shadow:rgba(122,61,85,.12)}
    body.theme-twin{--page:#f1f7ef;--cream:#fbfff8;--soft:#e7f3df;--brown:#3e5c3a;--light:#7ca878;--text:#263522;--muted:#62745f;--border:#dbe9d4;--shadow:rgba(62,92,58,.12)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 10% 0%,rgba(198,164,106,.18),transparent 32%),radial-gradient(circle at 90% 10%,rgba(155,115,87,.12),transparent 30%),linear-gradient(180deg,#fbf7f1,var(--page));color:var(--text)}
    .wrap{max-width:1180px;margin:0 auto;padding:24px 18px}
    header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:22px}
    .brand{display:flex;align-items:center;gap:12px;color:var(--brown);font-size:23px;font-weight:950;letter-spacing:-.5px;text-decoration:none}
    .brand-icon{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,var(--brown),var(--light));color:white;display:flex;align-items:center;justify-content:center;font-weight:950;box-shadow:0 14px 28px var(--shadow)}
    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .language-buttons{display:flex;gap:8px;flex-wrap:wrap}
    .language-buttons button,.button-light,.filter-button{border:1px solid var(--border);background:white;color:var(--brown);padding:9px 12px;border-radius:999px;cursor:pointer;font-weight:900;text-decoration:none}
    .language-buttons button.active,.filter-button.active{background:var(--brown);color:white}
    .logout{border:none;border-radius:16px;padding:12px 16px;background:var(--danger);color:white;font-weight:950;cursor:pointer}
    .card{background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:30px;padding:24px;box-shadow:0 24px 70px var(--shadow);backdrop-filter:blur(16px);margin-bottom:18px}
    h1,h2,h3{color:var(--brown);margin:0 0 12px}h1{font-size:34px;letter-spacing:-1.5px}h2{font-size:25px;letter-spacing:-.7px}h3{font-size:17px}p{margin:0;color:var(--muted);line-height:1.6}
    label{display:block;margin:14px 0 7px;color:var(--brown);font-size:13px;font-weight:900}
    input,select,textarea{width:100%;padding:13px 14px;border-radius:15px;border:1px solid var(--border);background:#fffdf9;color:var(--text);font-size:15px;font-family:inherit;outline:none}
    textarea{min-height:105px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--light);box-shadow:0 0 0 4px rgba(155,115,87,.12)}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .box,.event{background:linear-gradient(180deg,var(--cream),white);border:1px solid var(--border);border-radius:22px;padding:18px}
    .filters,.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
    .button{border:none;border-radius:13px;padding:10px 12px;font-size:14px;font-weight:900;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;background:var(--brown);color:white}.button.done{background:var(--success)}
    .button-danger{border:none;border-radius:13px;padding:10px 12px;font-weight:900;background:#f4dfd8;color:var(--danger);cursor:pointer}
    .badge{display:inline-flex;width:fit-content;padding:7px 10px;border-radius:999px;background:var(--soft);color:var(--brown);font-size:12px;font-weight:900;margin:0 4px 6px 0}
    .message{max-width:650px;margin:60px auto;text-align:center}.hidden{display:none!important}
    @media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}h1{font-size:28px}}

    function t(){return translations[currentLang] || translations.de;}

    function setLanguage(lang){
      currentLang = lang;
      localStorage.setItem("mama_lang", lang);
      document.documentElement.lang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";
      document.querySelectorAll(".language-buttons button").forEach(btn => btn.classList.remove("active"));
      const active = document.getElementById("lang-" + lang);
      if (active) active.classList.add("active");
      const tr = t();
      Object.keys(tr).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = tr[id];
      });
      renderCalendar();
    }

    function parseLocalDate(value){const p=value.split("-").map(Number);return new Date(p[0],p[1]-1,p[2]);}
    function addDays(date,days){const r=new Date(date);r.setDate(r.getDate()+days);return r;}
    function toInputDate(date){return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;}
    function calculatePregnancy(dueDate){
      const today=new Date();today.setHours(0,0,0,0);
      const start=addDays(dueDate,-280);
      let week=Math.floor((today-start)/(1000*60*60*24*7))+1;
      if(week<1)week=1;if(week>42)week=42;
      return {pregnancyWeek:week};
    }
    function formatDate(date){
      const locale=currentLang==="de"?"de-DE":currentLang==="fr"?"fr-FR":currentLang==="ar"?"ar-SA":currentLang==="tr"?"tr-TR":currentLang==="ru"?"ru-RU":currentLang==="uk"?"uk-UA":"en-GB";
      return date.toLocaleDateString(locale,{day:"2-digit",month:"2-digit",year:"numeric"});
    }
    function determineTheme(type,gender){
      if(gender==="boy"||gender==="twin_boys")return "boy";
      if(gender==="girl"||gender==="twin_girls")return "girl";
      if(type==="twins"||gender==="twin_mixed")return "twin";
      return "neutral";
    }
    function applyTheme(theme){
      document.body.classList.remove("theme-boy","theme-girl","theme-twin");
      if(theme==="boy")document.body.classList.add("theme-boy");
      if(theme==="girl")document.body.classList.add("theme-girl");
      if(theme==="twin")document.body.classList.add("theme-twin");
    }

    async function loadPage(){
      const {data,error}=await supabaseClient.auth.getSession();
      if(error||!data.session){document.getElementById("loginMessage").style.display="block";return;}
      currentUser=data.session.user;
      const {data:profiles,error:profileError}=await supabaseClient.from("pregnancy_profiles").select("*").eq("user_id",currentUser.id).order("created_at",{ascending:false}).limit(1);
      if(profileError||!profiles||profiles.length===0){window.location.href="index.html?reason=no_profile";return;}
      currentProfile=profiles[0];
      currentLang=localStorage.getItem("mama_lang")||currentProfile.language||"de";
      applyTheme(determineTheme(currentProfile.pregnancy_type,currentProfile.baby_gender));
      if(currentProfile.due_date){lastPregnancyWeek=calculatePregnancy(parseLocalDate(currentProfile.due_date)).pregnancyWeek;}
      document.getElementById("pageShell").style.display="block";
      await loadCalendarEvents();
      setLanguage(currentLang);
    }

    async function loadCalendarEvents(){
      const {data,error}=await supabaseClient.from("pregnancy_calendar_events").select("*").eq("user_id",currentUser.id).order("event_date",{ascending:true});
      calendarEvents=error?[]:(data||[]);
    }

    function getEventCategoryLabel(category){
      if(category==="medical")return t().medicalLabel;
      if(category==="course")return t().courseLabel;
      if(category==="administratif")return t().adminLabel;
      if(category==="shopping")return t().shoppingLabel;
      if(category==="personal")return t().personalLabel;
      return t().calAll;
    }

    function updateCalendarButtons(){
      [["calAll","all"],["calMedical","medical"],["calCourse","course"],["calAdmin","administratif"],["calShopping","shopping"],["calPersonal","personal"]].forEach(([id,value])=>{
        const btn=document.getElementById(id);
        if(btn)btn.classList.toggle("active",calendarCategoryFilter===value);
      });
    }

    function setCalendarCategory(category){
      calendarCategoryFilter=category;
      renderCalendar();
    }

    function renderCalendar(){
      const list=document.getElementById("calendarList");
      if(!list)return;
      updateCalendarButtons();
      list.innerHTML="";
      const visible=calendarCategoryFilter==="all"?calendarEvents:calendarEvents.filter(e=>e.category===calendarCategoryFilter);
      if(!visible.length){list.innerHTML=`<p>${t().noEvents}</p>`;return;}
      visible.forEach(event=>list.appendChild(renderEvent(event)));
    }

    function renderEvent(event){
      const card=document.createElement("div");
      card.className="event";
      let description=event.description||"";
      if(event.event_time)description+=(description?"\n":"")+event.event_time;
      if(event.location)description+=(description?"\n":"")+`📍 ${event.location}`;
      card.innerHTML=`
        <div class="badge">${formatDate(parseLocalDate(event.event_date))}</div>
        <div class="badge">${getEventCategoryLabel(event.category)}</div>
        <h3>${event.title}</h3>
        <p style="white-space:pre-line">${description}</p>
      `;
      const actions=document.createElement("div");
      actions.className="actions";
      const doneButton=document.createElement("button");
      doneButton.className=event.done?"button done":"button";
      doneButton.textContent=event.done?t().eventDone:t().eventOpen;
      doneButton.onclick=()=>toggleCalendarEvent(event.id,!event.done);
      const icsButton=document.createElement("button");
      icsButton.className="button-light";
      icsButton.textContent=t().addToCalendar;
      icsButton.onclick=()=>downloadICS(event);
      actions.appendChild(doneButton);
      actions.appendChild(icsButton);
      if(event.link_url){
        const link=document.createElement("a");
        link.className="button-light";
        link.href=event.link_url;
        link.target="_blank";
        link.textContent=t().openApplication;
        actions.appendChild(link);
      }
      card.appendChild(actions);
      return card;
    }

    async function saveManualEvent(){
      const title=document.getElementById("manualTitle").value.trim();
      const date=document.getElementById("manualDate").value;
      if(!title||!date){alert(t().manualMissing);return;}
      const row={
        user_id:currentUser.id, profile_id:currentProfile.id, title,
        description:document.getElementById("manualDescription").value.trim(),
        event_date:date,
        event_time:document.getElementById("manualTime").value||null,
        pregnancy_week:lastPregnancyWeek,
        category:document.getElementById("manualCategory").value,
        source_type:"manual",
        source_key:`manual-${Date.now()}`,
        location:document.getElementById("manualLocation").value.trim(),
        link_url:document.getElementById("manualLink").value.trim(),
        reminder_days:Number(document.getElementById("manualReminder").value||14),
        done:false
      };
      const {error}=await supabaseClient.from("pregnancy_calendar_events").insert(row);
      if(error){alert(error.message);return;}
      ["manualTitle","manualDate","manualTime","manualLocation","manualLink","manualDescription"].forEach(id=>document.getElementById(id).value="");
      alert(t().manualSaved);
      await loadCalendarEvents();
      renderCalendar();
    }

    async function toggleCalendarEvent(id,done){
      await supabaseClient.from("pregnancy_calendar_events").update({done}).eq("id",id).eq("user_id",currentUser.id);
      await loadCalendarEvents();
      renderCalendar();
    }

    function escapeICS(value){return String(value||"").replace(/\\/g,"\\\\").replace(/\n/g,"\\n").replace(/,/g,"\\,").replace(/;/g,"\\;");}
    function icsDate(value){return value.replaceAll("-","");}
    function downloadICS(event){
      const end=toInputDate(addDays(parseLocalDate(event.event_date),1));
      const ics=`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Mama in Deutschland//DE\nBEGIN:VEVENT\nUID:${event.id}@mama-in-deutschland\nDTSTAMP:${new Date().toISOString().replace(/[-:]/g,"").split(".")[0]}Z\nDTSTART;VALUE=DATE:${icsDate(event.event_date)}\nDTEND;VALUE=DATE:${icsDate(end)}\nSUMMARY:${escapeICS(event.title)}\nDESCRIPTION:${escapeICS(event.description||"")}\nEND:VEVENT\nEND:VCALENDAR`;
      const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=`${t().calendarFileName}-${event.event_date}.ics`;
      document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);
    }

    async function signOut(){
      await supabaseClient.auth.signOut();
      window.location.href="index.html";
    }

    loadPage();
  </script>
</body>
</html>
