<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mama in Deutschland - Ernährung</title>

  <style>
    :root {
      --page:#f8f3ec;
      --card:#ffffff;
      --cream:#fffaf4;
      --soft:#f3eadf;
      --brown:#4a3428;
      --light:#9b7357;
      --text:#2f2621;
      --muted:#7b6a60;
      --border:#eadfd2;
      --danger:#b45b48;
      --success:#5f8d63;
      --shadow:rgba(74,52,40,.12);
    }

    body.theme-boy {
      --page:#eef7ff;
      --cream:#f7fbff;
      --soft:#e8f4ff;
      --brown:#244b6b;
      --light:#5f93bd;
      --text:#1d3347;
      --muted:#5c7285;
      --border:#d6e8f7;
      --shadow:rgba(36,75,107,.12);
    }

    body.theme-girl {
      --page:#fff1f5;
      --cream:#fff8fa;
      --soft:#fde8ef;
      --brown:#7a3d55;
      --light:#c47a98;
      --text:#3d2430;
      --muted:#7b6070;
      --border:#f0d4df;
      --shadow:rgba(122,61,85,.12);
    }

    body.theme-twin {
      --page:#f1f7ef;
      --cream:#fbfff8;
      --soft:#e7f3df;
      --brown:#3e5c3a;
      --light:#7ca878;
      --text:#263522;
      --muted:#62745f;
      --border:#dbe9d4;
      --shadow:rgba(62,92,58,.12);
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      min-height:100vh;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 10% 0%,rgba(198,164,106,.18),transparent 32%),
        radial-gradient(circle at 90% 10%,rgba(155,115,87,.12),transparent 30%),
        linear-gradient(180deg,#fbf7f1,var(--page));
      color:var(--text);
    }

    .wrap {
      max-width:1180px;
      margin:0 auto;
      padding:24px 18px;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--brown);
      font-size:23px;
      font-weight:950;
      letter-spacing:-.5px;
    }

    .brand-icon {
      width:44px;
      height:44px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--brown),var(--light));
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:950;
      box-shadow:0 14px 28px var(--shadow);
    }

    .top-actions,
    .language-buttons,
    .filters,
    .actions {
      display:flex;
      gap:9px;
      align-items:center;
      flex-wrap:wrap;
    }

    .language-buttons button,
    .button-light,
    .button,
    .filter-button {
      border:1px solid var(--border);
      background:white;
      color:var(--brown);
      padding:10px 13px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      text-decoration:none;
      font-family:inherit;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .language-buttons button.active,
    .filter-button.active {
      background:var(--brown);
      color:white;
    }

    .button {
      background:var(--brown);
      color:white;
      border-color:var(--brown);
    }

    .button.done {
      background:var(--success);
      border-color:var(--success);
    }

    .button-danger {
      border:1px solid #f1c9bf;
      background:#fff0ec;
      color:var(--danger);
      padding:10px 13px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      font-family:inherit;
    }

    .card {
      background:rgba(255,255,255,.92);
      border:1px solid var(--border);
      border-radius:30px;
      padding:24px;
      box-shadow:0 24px 70px var(--shadow);
      backdrop-filter:blur(16px);
      margin-bottom:18px;
    }

    h1,h2,h3 {
      color:var(--brown);
      margin:0 0 12px;
    }

    h1 {
      font-size:34px;
      letter-spacing:-1.5px;
    }

    h2 {
      font-size:25px;
      letter-spacing:-.7px;
    }

    h3 {
      font-size:17px;
    }

    p {
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .soft {
      padding:14px 16px;
      border-radius:18px;
      background:var(--soft);
      border:1px solid var(--border);
      color:var(--brown);
      font-weight:900;
      margin-top:14px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:16px;
    }

    .grid-2 {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:16px;
    }

    .item-card {
      background:linear-gradient(180deg,var(--cream),white);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
    }

    .badge {
      display:inline-flex;
      width:fit-content;
      padding:7px 10px;
      border-radius:999px;
      background:var(--soft);
      color:var(--brown);
      font-size:12px;
      font-weight:900;
      margin:0 5px 8px 0;
    }

    label {
      display:block;
      margin:14px 0 7px;
      color:var(--brown);
      font-size:13px;
      font-weight:900;
    }

    input,
    select,
    textarea {
      width:100%;
      padding:13px 14px;
      border-radius:15px;
      border:1px solid var(--border);
      background:#fffdf9;
      color:var(--text);
      font-size:15px;
      font-family:inherit;
      outline:none;
    }

    textarea {
      min-height:90px;
      resize:vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color:var(--light);
      box-shadow:0 0 0 4px rgba(155,115,87,.12);
    }

    .shopping-row {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:12px 0;
      border-bottom:1px solid var(--border);
    }

    .shopping-row:last-child {
      border-bottom:none;
    }

    .shopping-main {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .shopping-main input {
      width:auto;
    }

    .empty {
      padding:18px;
      border-radius:18px;
      background:var(--soft);
      color:var(--muted);
      border:1px solid var(--border);
    }

    .message {
      max-width:650px;
      margin:60px auto;
      text-align:center;
    }

    @media(max-width:900px) {
      .grid,
      .grid-2 {
        grid-template-columns:1fr;
      }
    }

    @media(max-width:560px) {
      .wrap {
        padding:18px 12px;
      }

      h1 {
        font-size:28px;
      }

      .card {
        padding:20px;
      }
    }
  </style>
</head>

    function t(){
      return translations[currentLang] || translations.de;
    }

    function setLanguage(lang){
      currentLang = lang;
      localStorage.setItem("mama_lang", lang);

      document.documentElement.lang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll(".language-buttons button").forEach(btn => btn.classList.remove("active"));
      const active = document.getElementById("lang-" + lang);
      if (active) active.classList.add("active");

      const tr = t();

      Object.keys(tr).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = tr[id];
      });

      updateWeekBox();
      updateButtons();
      renderContent();
    }

    function getLocalized(row, field){
      if (!row) return "";
      return row[`${field}_${currentLang}`] || row[`${field}_de`] || row[`${field}_en`] || "";
    }

    function determineTheme(type, gender){
      if (gender === "boy" || gender === "twin_boys") return "boy";
      if (gender === "girl" || gender === "twin_girls") return "girl";
      if (type === "twins" || gender === "twin_mixed") return "twin";
      return "neutral";
    }

    function applyTheme(theme){
      document.body.classList.remove("theme-boy","theme-girl","theme-twin");
      if (theme === "boy") document.body.classList.add("theme-boy");
      if (theme === "girl") document.body.classList.add("theme-girl");
      if (theme === "twin") document.body.classList.add("theme-twin");
    }

    function parseLocalDate(value){
      const parts = value.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function addDays(date, days){
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function calculatePregnancy(dueDate){
      const today = new Date();
      today.setHours(0,0,0,0);
      const start = addDays(dueDate, -280);
      let week = Math.floor((today - start) / (1000 * 60 * 60 * 24 * 7)) + 1;
      if (week < 1) week = 1;
      if (week > 42) week = 42;
      return week;
    }

    function updateWeekBox(){
      if (!currentProfile) return;

      const week = currentProfile.due_date
        ? calculatePregnancy(parseLocalDate(currentProfile.due_date))
        : "-";

      document.getElementById("weekBox").textContent = `${t().week} ${week} · ${t().note}: ${t().safetyNote}`;
    }

    async function loadApp(){
      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data.session) {
        document.getElementById("loginMessage").style.display = "block";
        document.getElementById("appShell").style.display = "none";
        return;
      }

      currentUser = data.session.user;

      const { data: profiles, error: profileError } = await supabaseClient
        .from("pregnancy_profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending:false })
        .limit(1);

      if (profileError || !profiles || profiles.length === 0) {
        window.location.href = "index.html?reason=no_profile";
        return;
      }

      currentProfile = profiles[0];
      currentLang = localStorage.getItem("mama_lang") || currentProfile.language || "de";

      applyTheme(determineTheme(currentProfile.pregnancy_type, currentProfile.baby_gender));

      document.getElementById("loginMessage").style.display = "none";
      document.getElementById("appShell").style.display = "block";

      setLanguage(currentLang);
    }

    function updateButtons(){
      [
        ["catMeals","meals"],
        ["catSafe","safe"],
        ["catAvoid","avoid"],
        ["catShopping","shopping"]
      ].forEach(([id,value]) => {
        const button = document.getElementById(id);
        if (button) button.classList.toggle("active", categoryFilter === value);
      });
    }

    function setCategory(category){
      categoryFilter = category;
      updateButtons();
      renderContent();
    }

    function renderContent(){
      const area = document.getElementById("contentArea");
      area.innerHTML = "";

      if (categoryFilter === "shopping") {
        renderShopping();
        return;
      }

      const grid = document.createElement("div");
      grid.className = "grid";

      (content[categoryFilter] || []).forEach(item => {
        const card = document.createElement("div");
        card.className = "item-card";

        card.innerHTML = `
          <div class="badge">${item.emoji}</div>
          <h3>${getLocalized(item, "title")}</h3>
          <p>${getLocalized(item, "text")}</p>
        `;

        if (item.shopping) {
          const actions = document.createElement("div");
          actions.className = "actions";
          actions.style.marginTop = "14px";

          const button = document.createElement("button");
          button.className = "button-light";
          button.textContent = t().addToShopping;
          button.onclick = () => {
            addManyToShopping(item.shopping);
            button.textContent = t().added;
          };

          actions.appendChild(button);
          card.appendChild(actions);
        }

        grid.appendChild(card);
      });

      area.appendChild(grid);
    }

    function storageKey(){
      return `nutrition-shopping-${currentUser?.id || "guest"}`;
    }

    function getShopping(){
      try {
        return JSON.parse(localStorage.getItem(storageKey())) || [];
      } catch(e) {
        return [];
      }
    }

    function saveShopping(items){
      localStorage.setItem(storageKey(), JSON.stringify(items));
    }

    function addManyToShopping(names){
      const items = getShopping();
      names.forEach(name => {
        if (!items.some(item => item.name.toLowerCase() === name.toLowerCase())) {
          items.push({ name, done:false });
        }
      });
      saveShopping(items);
    }

    function addCustomItem(){
      const input = document.getElementById("customItemInput");
      const name = input.value.trim();

      if (!name) return;

      addManyToShopping([name]);
      input.value = "";
      renderShopping();
    }

    function toggleShopping(index){
      const items = getShopping();
      items[index].done = !items[index].done;
      saveShopping(items);
      renderShopping();
    }

    function deleteShopping(index){
      const items = getShopping();
      items.splice(index, 1);
      saveShopping(items);
      renderShopping();
    }

    function clearDoneShopping(){
      const items = getShopping().filter(item => !item.done);
      saveShopping(items);
      renderShopping();
    }

    function renderShopping(){
      const area = document.getElementById("contentArea");

      const wrapper = document.createElement("div");
      wrapper.className = "grid-2";

      const form = document.createElement("div");
      form.className = "item-card";

      form.innerHTML = `
        <h2>${t().shoppingTitle}</h2>
        <p>${t().shoppingText}</p>
        <label for="customItemInput">${t().addCustom}</label>
        <input id="customItemInput" placeholder="${t().customPlaceholder}" />
        <div class="actions" style="margin-top:14px;">
          <button class="button" onclick="addCustomItem()">${t().addCustom}</button>
          <button class="button-light" onclick="clearDoneShopping()">${t().clearDone}</button>
        </div>
      `;

      const listBox = document.createElement("div");
      listBox.className = "item-card";

      const items = getShopping();

      if (items.length === 0) {
        listBox.innerHTML = `<div class="empty">${t().emptyShopping}</div>`;
      } else {
        items.forEach((item, index) => {
          const row = document.createElement("div");
          row.className = "shopping-row";

          row.innerHTML = `
            <div class="shopping-main">
              <input type="checkbox" ${item.done ? "checked" : ""} onchange="toggleShopping(${index})" />
              <span style="${item.done ? "text-decoration:line-through;color:var(--muted);" : ""}">${item.name}</span>
            </div>
            <button class="button-danger" onclick="deleteShopping(${index})">${t().delete}</button>
          `;

          listBox.appendChild(row);
        });
      }

      wrapper.appendChild(form);
      wrapper.appendChild(listBox);
      area.appendChild(wrapper);
    }

    loadApp();
  </script>
