<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mama in Deutschland - Nach der Geburt</title>

  <style>
    :root {
      --page:#f8f3ec;
      --card:#ffffff;
      --cream:#fffaf4;
      --soft:#f3eadf;
      --brown:#4a3428;
      --light:#9b7357;
      --text:#2f2621;
      --muted:#7b6a60;
      --border:#eadfd2;
      --danger:#b45b48;
      --success:#5f8d63;
      --shadow:rgba(74,52,40,.12);
    }

    body.theme-boy {
      --page:#eef7ff;
      --cream:#f7fbff;
      --soft:#e8f4ff;
      --brown:#244b6b;
      --light:#5f93bd;
      --text:#1d3347;
      --muted:#5c7285;
      --border:#d6e8f7;
      --shadow:rgba(36,75,107,.12);
    }

    body.theme-girl {
      --page:#fff1f5;
      --cream:#fff8fa;
      --soft:#fde8ef;
      --brown:#7a3d55;
      --light:#c47a98;
      --text:#3d2430;
      --muted:#7b6070;
      --border:#f0d4df;
      --shadow:rgba(122,61,85,.12);
    }

    body.theme-twin {
      --page:#f1f7ef;
      --cream:#fbfff8;
      --soft:#e7f3df;
      --brown:#3e5c3a;
      --light:#7ca878;
      --text:#263522;
      --muted:#62745f;
      --border:#dbe9d4;
      --shadow:rgba(62,92,58,.12);
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      min-height:100vh;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 10% 0%,rgba(198,164,106,.18),transparent 32%),
        radial-gradient(circle at 90% 10%,rgba(155,115,87,.12),transparent 30%),
        linear-gradient(180deg,#fbf7f1,var(--page));
      color:var(--text);
    }

    .wrap {
      max-width:1180px;
      margin:0 auto;
      padding:24px 18px;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--brown);
      font-size:23px;
      font-weight:950;
      letter-spacing:-.5px;
    }

    .brand-icon {
      width:44px;
      height:44px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--brown),var(--light));
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:950;
      box-shadow:0 14px 28px var(--shadow);
    }

    .top-actions,
    .language-buttons,
    .filters,
    .actions {
      display:flex;
      gap:9px;
      align-items:center;
      flex-wrap:wrap;
    }

    .language-buttons button,
    .button-light,
    .button,
    .filter-button {
      border:1px solid var(--border);
      background:white;
      color:var(--brown);
      padding:10px 13px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      text-decoration:none;
      font-family:inherit;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .language-buttons button.active,
    .filter-button.active {
      background:var(--brown);
      color:white;
    }

    .button {
      background:var(--brown);
      color:white;
      border-color:var(--brown);
    }

    .button.done {
      background:var(--success);
      border-color:var(--success);
    }

    .card {
      background:rgba(255,255,255,.92);
      border:1px solid var(--border);
      border-radius:30px;
      padding:24px;
      box-shadow:0 24px 70px var(--shadow);
      backdrop-filter:blur(16px);
      margin-bottom:18px;
    }

    h1,h2,h3 {
      color:var(--brown);
      margin:0 0 12px;
    }

    h1 {
      font-size:34px;
      letter-spacing:-1.5px;
    }

    h2 {
      font-size:25px;
      letter-spacing:-.7px;
    }

    h3 {
      font-size:17px;
    }

    p {
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .soft {
      padding:14px 16px;
      border-radius:18px;
      background:var(--soft);
      border:1px solid var(--border);
      color:var(--brown);
      font-weight:900;
      margin-top:14px;
    }

    .grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:16px;
    }

    .item-card {
      background:linear-gradient(180deg,var(--cream),white);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
    }

    .badge {
      display:inline-flex;
      width:fit-content;
      padding:7px 10px;
      border-radius:999px;
      background:var(--soft);
      color:var(--brown);
      font-size:12px;
      font-weight:900;
      margin:0 5px 8px 0;
    }

    .empty {
      padding:18px;
      border-radius:18px;
      background:var(--soft);
      color:var(--muted);
      border:1px solid var(--border);
    }

    .message {
      max-width:650px;
      margin:60px auto;
      text-align:center;
    }

    @media(max-width:900px) {
      .grid {
        grid-template-columns:1fr;
      }
    }

    @media(max-width:560px) {
      .wrap {
        padding:18px 12px;
      }

      h1 {
        font-size:28px;
      }

      .card {
        padding:20px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand">
        <div class="brand-icon">M</div>
        <span>Mama in Deutschland</span>
      </div>

      <div class="top-actions">
        <a class="button-light" href="app.html" id="backButton">Zurück</a>

        <div class="language-buttons">
          <button id="lang-de" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
          <button id="lang-fr" onclick="setLanguage('fr')">🇫🇷 Français</button>
          <button id="lang-ar" onclick="setLanguage('ar')">🇸🇦 العربية</button>
          <button id="lang-en" onclick="setLanguage('en')">🇬🇧 English</button>
          <button id="lang-tr" onclick="setLanguage('tr')">🇹🇷 Türkçe</button>
          <button id="lang-ru" onclick="setLanguage('ru')">🇷🇺 Русский</button>
          <button id="lang-uk" onclick="setLanguage('uk')">🇺🇦 Українська</button>
        </div>
      </div>
    </header>

    <main id="appShell" style="display:none;">
      <section class="card">
        <h1 id="pageTitle">Nach der Geburt</h1>
        <p id="pageText">Die wichtigsten Schritte nach der Geburt: U-Untersuchungen, Wochenbett, Krankenkasse und Anträge.</p>
        <div class="soft" id="progressBox">0 / 0 erledigt</div>
      </section>

      <section class="card">
        <div class="filters">
          <button class="filter-button active" onclick="setCategory('all')" id="catAll">Alle</button>
          <button class="filter-button" onclick="setCategory('baby_medical')" id="catBabyMedical">U-Untersuchungen</button>
          <button class="filter-button" onclick="setCategory('bureaucracy')" id="catBureaucracy">Bürokratie</button>
          <button class="filter-button" onclick="setCategory('money')" id="catMoney">Geld</button>
          <button class="filter-button" onclick="setCategory('mama')" id="catMama">Mama</button>
        </div>

        <div class="grid" id="itemsList"></div>
      </section>
    </main>

    <section class="message card" id="loginMessage" style="display:none;">
      <h2 id="loginTitle">Bitte einloggen</h2>
      <p id="loginText">Du musst dich zuerst anmelden.</p>
      <br />
      <a class="button-light" href="index.html" id="loginBackButton">Zur Startseite</a>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://jzhaihiojpcelndexwxv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6aGFpaGlvanBjZWxuZGV4d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTcxNjIsImV4cCI6MjA5NzY5MzE2Mn0.kIF2XmcIcf0UCmhVrmX3Zcc9U5_VnoDGHgaSk-iZrjQ";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let currentProfile = null;
    let currentLang = localStorage.getItem("mama_lang") || "de";
    let categoryFilter = "all";

    const translations = {
      de:{
        backButton:"Zurück",
        pageTitle:"Nach der Geburt",
        pageText:"Die wichtigsten Schritte nach der Geburt: U-Untersuchungen, Wochenbett, Krankenkasse und Anträge.",

      fr:{
        backButton:"Retour",

        pageText:"Les étapes importantes après la naissance : examens U, repos maman, assurance maladie et demandes.",
        doneText:"terminé",
        empty:"Aucun élément pour le moment.",
        openStatus:"Ouvert",
        doneStatus:"Terminé",
        markDone:"Marquer comme terminé",
        markOpen:"Marquer comme ouvert",
        openLink:"Ouvrir l’information",

        loginBackButton:"Retour à l’accueil"
      },
      ar:{
        backButton:"رجوع",
        pageTitle:"بعد الولادة",
        pageText:"أهم الخطوات بعد الولادة: فحوصات U، النفاس، التأمين الصحي والطلبات.",
        doneText:"تم",
        empty:"لا توجد عناصر حالياً.",
        openStatus:"مفتوح",
        doneStatus:"تم",
        markDone:"تحديد كمنجز",
        markOpen:"تحديد كمفتوح",

        day:"اليوم",

        catBabyMedical:"فحوصات U",
        catBureaucracy:"الإجراءات",

        loginTitle:"يرجى تسجيل الدخول",
        loginText:"يجب تسجيل الدخول أولاً.",
        loginBackButton:"العودة للرئيسية"
      },
      en:{
        backButton:"Back",
        pageTitle:"After birth",
        pageText:"The most important steps after birth: U examinations, postpartum, health insurance and applications.",
        doneText:"done",
        empty:"No entries yet.",
        openStatus:"Open",
        doneStatus:"Done",
        markDone:"Mark as done",
        markOpen:"Mark as open",
        openLink:"Open information",
        day:"Day",

        catBabyMedical:"U examinations",
        catBureaucracy:"Bureaucracy",
        catMoney:"Money",
        catMama:"Mother",
        loginTitle:"Please log in",
        loginText:"You need to log in first.",
        loginBackButton:"Back to home"
      },
      tr:{
        backButton:"Geri",
        pageTitle:"Doğumdan sonra",
        pageText:"Doğumdan sonra önemli adımlar: U muayeneleri, lohusalık, sağlık sigortası ve başvurular.",
        doneText:"tamamlandı",
        empty:"Henüz kayıt yok.",
        openStatus:"Açık",
        doneStatus:"Tamamlandı",
        markDone:"Tamamlandı olarak işaretle",
        markOpen:"Açık olarak işaretle",
        openLink:"Bilgiyi aç",
        day:"Gün",
        catAll:"Hepsi",
        catBabyMedical:"U muayeneleri",
        catBureaucracy:"Bürokrasi",
        catMoney:"Para",
        catMama:"Anne",
        loginTitle:"Lütfen giriş yap",
        loginText:"Önce giriş yapmalısın.",
        loginBackButton:"Ana sayfaya dön"
      },
      ru:{
        backButton:"Назад",
        pageTitle:"После рождения",
        pageText:"Самые важные шаги после рождения: U-осмотры, восстановление, медицинская страховка и заявления.",
        doneText:"готово",
        empty:"Пока нет записей.",
        openStatus:"Открыто",
        doneStatus:"Готово",
        markDone:"Отметить как готово",
        markOpen:"Отметить как открыто",
        openLink:"Открыть информацию",
        day:"День",
        catAll:"Все",
        catBabyMedical:"U-осмотры",
        catBureaucracy:"Бюрократия",
        catMoney:"Деньги",
        catMama:"Мама",
        loginTitle:"Войдите в аккаунт",
        loginText:"Сначала нужно войти.",
        loginBackButton:"На главную"
      },
      uk:{
        backButton:"Назад",
        pageTitle:"Після народження",
        pageText:"Найважливіші кроки після народження: U-огляди, відновлення, медична страховка та заяви.",
        doneText:"готово",
        empty:"Поки немає записів.",
        openStatus:"Відкрито",
        doneStatus:"Готово",
        markDone:"Позначити як готово",
        markOpen:"Позначити як відкрито",
        openLink:"Відкрити інформацію",
        day:"День",
        catAll:"Усі",
        catBabyMedical:"U-огляди",
        catBureaucracy:"Бюрократія",
        catMoney:"Гроші",
        catMama:"Мама",
        loginTitle:"Увійдіть",
        loginText:"Спочатку потрібно увійти.",
        loginBackButton:"На головну"
      }
    };

    function t(){
      return translations[currentLang] || translations.de;
    }

    function setLanguage(lang){
      currentLang = lang;
      localStorage.setItem("mama_lang", lang);

      document.documentElement.lang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll(".language-buttons button").forEach(btn => btn.classList.remove("active"));
      const active = document.getElementById("lang-" + lang);
      if (active) active.classList.add("active");

      const tr = t();

      Object.keys(tr).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = tr[id];
      });

      updateButtons();
      loadItems();
    }

    function getLocalized(row, field){
      if (!row) return "";
      return row[`${field}_${currentLang}`] || row[`${field}_de`] || row[`${field}_en`] || "";
    }

    function determineTheme(type, gender){
      if (gender === "boy" || gender === "twin_boys") return "boy";
      if (gender === "girl" || gender === "twin_girls") return "girl";
      if (type === "twins" || gender === "twin_mixed") return "twin";
      return "neutral";
    }

    function applyTheme(theme){
      document.body.classList.remove("theme-boy","theme-girl","theme-twin");
      if (theme === "boy") document.body.classList.add("theme-boy");
      if (theme === "girl") document.body.classList.add("theme-girl");
      if (theme === "twin") document.body.classList.add("theme-twin");
    }

    function getCategoryLabel(category){
      if (category === "baby_medical") return t().catBabyMedical;
      if (category === "bureaucracy") return t().catBureaucracy;
      if (category === "money") return t().catMoney;
      if (category === "mama") return t().catMama;
      return t().catAll;
    }

    async function loadApp(){
      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data.session) {
        document.getElementById("loginMessage").style.display = "block";
        document.getElementById("appShell").style.display = "none";
        return;
      }

      currentUser = data.session.user;

      const { data: profiles, error: profileError } = await supabaseClient
        .from("pregnancy_profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending:false })
        .limit(1);

      if (profileError || !profiles || profiles.length === 0) {
        window.location.href = "index.html?reason=no_profile";
        return;
      }

      currentProfile = profiles[0];
      currentLang = localStorage.getItem("mama_lang") || currentProfile.language || "de";

      applyTheme(determineTheme(currentProfile.pregnancy_type, currentProfile.baby_gender));

      document.getElementById("loginMessage").style.display = "none";
      document.getElementById("appShell").style.display = "block";

      setLanguage(currentLang);
    }

    function updateButtons(){
      [
        ["catAll","all"],
        ["catBabyMedical","baby_medical"],
        ["catBureaucracy","bureaucracy"],
        ["catMoney","money"],
        ["catMama","mama"]
      ].forEach(([id,value]) => {
        const button = document.getElementById(id);
        if (button) button.classList.toggle("active", categoryFilter === value);
      });
    }

    function setCategory(category){
      categoryFilter = category;
      updateButtons();
      loadItems();
    }

    async function loadItems(){
      if (!currentUser || !currentProfile) return;

      const list = document.getElementById("itemsList");
      const progress = document.getElementById("progressBox");

      list.innerHTML = "";

      let query = supabaseClient
        .from("after_birth_templates")
        .select("*")
        .order("sort_order", { ascending:true });

      if (categoryFilter !== "all") {
        query = query.eq("category", categoryFilter);
      }

      const { data: templates, error } = await query;

      if (error || !templates || templates.length === 0) {
        list.innerHTML = `<div class="empty">${error ? error.message : t().empty}</div>`;
        if (progress) progress.textContent = `0 / 0 ${t().doneText}`;
        return;
      }

      const { data: statuses } = await supabaseClient
        .from("user_after_birth_status")
        .select("*")
        .eq("user_id", currentUser.id);

      const statusMap = {};
      (statuses || []).forEach(status => {
        statusMap[status.template_key] = status.status;
      });

      const doneCount = templates.filter(item => statusMap[item.key] === "done").length;
      progress.textContent = `${doneCount} / ${templates.length} ${t().doneText}`;

      templates.forEach(item => {
        const isDone = statusMap[item.key] === "done";

        const card = document.createElement("div");
        card.className = "item-card";

        card.innerHTML = `
          <div class="badge">${getCategoryLabel(item.category)}</div>
          <div class="badge">${isDone ? t().doneStatus : t().openStatus}</div>
          <div class="badge">${t().day} ${item.recommended_day || "-"}</div>
          <h3>${getLocalized(item, "title") || item.title_de || item.key}</h3>
          <p>${getLocalized(item, "description") || item.description_de || ""}</p>
        `;

        const actions = document.createElement("div");
        actions.className = "actions";

        const button = document.createElement("button");
        button.className = isDone ? "button done" : "button";
        button.textContent = isDone ? t().markOpen : t().markDone;
        button.onclick = () => toggleStatus(item.key, isDone ? "open" : "done");

        actions.appendChild(button);

        if (item.link_url) {
          const link = document.createElement("a");
          link.className = "button-light";
          link.href = item.link_url;
          link.target = "_blank";
          link.textContent = t().openLink;
          actions.appendChild(link);
        }

        card.appendChild(actions);
        list.appendChild(card);
      });
    }

    async function toggleStatus(templateKey, status){
      const { error } = await supabaseClient
        .from("user_after_birth_status")
        .upsert(
          {
            user_id: currentUser.id,
            profile_id: currentProfile.id,
            template_key: templateKey,
            status
          },
          { onConflict:"user_id,template_key" }
        );

      if (error) {
        alert(error.message);
        return;
      }

      await loadItems();
    }

    loadApp();
  </script>
</body>
</html>
