    :root {
      --page:#f8f3ec;
      --card:#ffffff;
      --cream:#fffaf4;
      --soft:#f3eadf;
      --brown:#4a3428;
      --light:#9b7357;
      --text:#2f2621;
      --muted:#7b6a60;
      --border:#eadfd2;
      --danger:#b45b48;
      --success:#5f8d63;
      --shadow:rgba(74,52,40,.12);
    }

    body.theme-boy {
      --page:#eef7ff;
      --cream:#f7fbff;
      --soft:#e8f4ff;
      --brown:#244b6b;
      --light:#5f93bd;
      --text:#1d3347;
      --muted:#5c7285;
      --border:#d6e8f7;
      --shadow:rgba(36,75,107,.12);
    }

    body.theme-girl {
      --page:#fff1f5;
      --cream:#fff8fa;
      --soft:#fde8ef;
      --brown:#7a3d55;
      --light:#c47a98;
      --text:#3d2430;
      --muted:#7b6070;
      --border:#f0d4df;
      --shadow:rgba(122,61,85,.12);
    }

    body.theme-twin {
      --page:#f1f7ef;
      --cream:#fbfff8;
      --soft:#e7f3df;
      --brown:#3e5c3a;
      --light:#7ca878;
      --text:#263522;
      --muted:#62745f;
      --border:#dbe9d4;
      --shadow:rgba(62,92,58,.12);
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      min-height:100vh;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 10% 0%,rgba(198,164,106,.18),transparent 32%),
        radial-gradient(circle at 90% 10%,rgba(155,115,87,.12),transparent 30%),
        linear-gradient(180deg,#fbf7f1,var(--page));
      color:var(--text);
    }

    .wrap {
      max-width:1180px;
      margin:0 auto;
      padding:24px 18px;
    }

    header {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      color:var(--brown);
      font-size:23px;
      font-weight:950;
      letter-spacing:-.5px;
    }

    .brand-icon {
      width:44px;
      height:44px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--brown),var(--light));
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:950;
      box-shadow:0 14px 28px var(--shadow);
    }

    .top-actions,
    .language-buttons,
    .actions {
      display:flex;
      gap:9px;
      align-items:center;
      flex-wrap:wrap;
    }

    .language-buttons button,
    .button-light,
    .button,
    .button-danger {
      border:1px solid var(--border);
      background:white;
      color:var(--brown);
      padding:10px 13px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      text-decoration:none;
      font-family:inherit;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .language-buttons button.active {
      background:var(--brown);
      color:white;
    }

    .button {
      background:var(--brown);
      color:white;
      border-color:var(--brown);
    }

    .button-danger {
      background:#fff0ec;
      color:var(--danger);
      border-color:#f1c9bf;
    }

    .card {
      background:rgba(255,255,255,.92);
      border:1px solid var(--border);
      border-radius:30px;
      padding:24px;
      box-shadow:0 24px 70px var(--shadow);
      backdrop-filter:blur(16px);
      margin-bottom:18px;
    }

    h1,h2,h3 {
      color:var(--brown);
      margin:0 0 12px;
    }

    h1 {
      font-size:34px;
      letter-spacing:-1.5px;
    }

    h2 {
      font-size:25px;
      letter-spacing:-.7px;
    }

    p {
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .soft {
      padding:14px 16px;
      border-radius:18px;
      background:var(--soft);
      border:1px solid var(--border);
      color:var(--brown);
      font-weight:900;
      margin-top:14px;
    }

    .grid-2 {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:16px;
    }

    .box {
      background:linear-gradient(180deg,var(--cream),white);
      border:1px solid var(--border);
      border-radius:22px;
      padding:18px;
    }

    label {
      display:block;
      margin:14px 0 7px;
      color:var(--brown);
      font-size:13px;
      font-weight:900;
    }

    input,
    select {
      width:100%;
      padding:13px 14px;
      border-radius:15px;
      border:1px solid var(--border);
      background:#fffdf9;
      color:var(--text);
      font-size:15px;
      font-family:inherit;
      outline:none;
    }

    input:focus,
    select:focus {
      border-color:var(--light);
      box-shadow:0 0 0 4px rgba(155,115,87,.12);
    }

    .message {
      display:none;
      margin-top:14px;
      padding:14px 15px;
      border-radius:18px;
      font-weight:850;
      line-height:1.45;
    }

    .message.error {
      display:block;
      background:#fff0ec;
      color:var(--danger);
      border:1px solid #f1c9bf;
    }

    .message.success {
      display:block;
      background:#edf7ee;
      color:var(--success);
      border:1px solid #cfe8d2;
    }

    .login-message {
      max-width:650px;
      margin:60px auto;
      text-align:center;
    }

    @media(max-width:900px) {
      .grid-2 {
        grid-template-columns:1fr;
      }
    }

    @media(max-width:560px) {
      .wrap {
        padding:18px 12px;
      }

      h1 {
        font-size:28px;
      }

      .card {
        padding:20px;
      }
    }
  </style>
</head>

  <div class="wrap">
    <header>
      <div class="brand">
        <div class="brand-icon">M</div>
        <span>Mama in Deutschland</span>
      </div>

      <div class="top-actions">
        <a class="button-light" href="app.html" id="backButton">Zurück</a>

        <div class="language-buttons">
          <button id="lang-de" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
          <button id="lang-fr" onclick="setLanguage('fr')">🇫🇷 Français</button>
          <button id="lang-ar" onclick="setLanguage('ar')">🇸🇦 العربية</button>
          <button id="lang-en" onclick="setLanguage('en')">🇬🇧 English</button>
          <button id="lang-tr" onclick="setLanguage('tr')">🇹🇷 Türkçe</button>
          <button id="lang-ru" onclick="setLanguage('ru')">🇷🇺 Русский</button>
          <button id="lang-uk" onclick="setLanguage('uk')">🇺🇦 Українська</button>
        </div>
      </div>
    </header>

    <main id="appShell" style="display:none;">
      <section class="card">
        <h1 id="pageTitle">Profil</h1>
        <p id="pageText">Ändere Sprache, Stadt, Babyname, Geburtstermin und Design.</p>
        <div class="soft" id="summaryBox">-</div>
      </section>

      <section class="card">
        <div class="grid-2">
          <div class="box">
            <h2 id="mamaTitle">Mama</h2>

            <label id="fullNameLabel" for="fullName">Name</label>
            <input id="fullName" />

            <label id="cityLabel" for="cityInput">Stadt</label>
            <input id="cityInput" />

            <label id="languageLabel" for="languageInput">Sprache</label>
            <select id="languageInput" onchange="profileLanguageChanged()">
              <option value="de">Deutsch</option>
              <option value="fr">Français</option>
              <option value="ar">العربية</option>
              <option value="en">English</option>
              <option value="tr">Türkçe</option>
              <option value="ru">Русский</option>
              <option value="uk">Українська</option>
            </select>
          </div>

          <div class="box">
            <h2 id="babyTitle">Baby</h2>

            <label id="babyNameLabel" for="babyName">Babyname</label>
            <input id="babyName" />

            <label id="dueDateLabel" for="dueDateInput">Geburtstermin</label>
            <input type="date" id="dueDateInput" onchange="updateSummary()" />

            <label id="pregnancyTypeLabel" for="pregnancyType">Schwangerschaft</label>
            <select id="pregnancyType" onchange="updateGenderOptions(); updateSummary();">
              <option value="singleton" id="singletonOption">Ein Baby</option>
              <option value="twins" id="twinsOption">Zwillinge</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="box">
            <h2 id="genderTitle">Geschlecht & Design</h2>

            <label id="genderLabel" for="babyGender">Geschlecht</label>
            <select id="babyGender" onchange="previewTheme(); updateSummary();">
              <option value="unknown" data-kind="both" id="genderUnknown">Noch nicht bekannt</option>
              <option value="boy" data-kind="singleton" id="genderBoy">Junge</option>
              <option value="girl" data-kind="singleton" id="genderGirl">Mädchen</option>
              <option value="twin_boys" data-kind="twins" id="genderTwinBoys">Zwillinge: Jungen</option>
              <option value="twin_girls" data-kind="twins" id="genderTwinGirls">Zwillinge: Mädchen</option>
              <option value="twin_mixed" data-kind="twins" id="genderTwinMixed">Zwillinge: Junge & Mädchen</option>
            </select>

            <div class="soft" id="themeBox">Design: neutral</div>
          </div>

          <div class="box">
            <h2 id="accountTitle">Konto</h2>

            <p id="emailText">E-mail</p>
            <div class="soft" id="emailBox">-</div>

            <div class="actions" style="margin-top:16px;">
              <button class="button-danger" onclick="signOut()" id="logoutButton">Ausloggen</button>
            </div>
          </div>
        </div>

        <div class="actions" style="margin-top:16px;">
          <button class="button" onclick="saveProfile()" id="saveButton">Profil speichern</button>
          <a class="button-light" href="app.html" id="backDashboardButton">Zum Dashboard</a>
        </div>

        <div class="message" id="messageBox"></div>
      </section>
    </main>

    <section class="login-message card" id="loginMessage" style="display:none;">
      <h2 id="loginTitle">Bitte einloggen</h2>
      <p id="loginText">Du musst dich zuerst anmelden.</p>
      <br />
      <a class="button-light" href="index.html" id="loginBackButton">Zur Startseite</a>
    </section>
  </div>

    function setLanguage(lang){
      currentLang = lang;
      localStorage.setItem("mama_lang", lang);

      document.documentElement.lang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll(".language-buttons button").forEach(btn => btn.classList.remove("active"));
      const active = document.getElementById("lang-" + lang);
      if (active) active.classList.add("active");

      const tr = t();

      Object.keys(tr).forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = tr[id];
      });

      document.getElementById("languageInput").value = lang;

      updateGenderOptions();
      updateSummary();
    }

    function showMessage(type, text){
      const box = document.getElementById("messageBox");
      box.className = "message " + type;
      box.textContent = text;
    }

    function parseLocalDate(value){
      const parts = value.split("-").map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }

    function addDays(date, days){
      const result = new Date(date);
      result.setDate(result.getDate() + days);
      return result;
    }

    function calculatePregnancy(dueDate){
      const today = new Date();
      today.setHours(0,0,0,0);
      const start = addDays(dueDate, -280);

      let week = Math.floor((today - start) / (1000 * 60 * 60 * 24 * 7)) + 1;
      if (week < 1) week = 1;
      if (week > 42) week = 42;

      const daysLeft = Math.ceil((dueDate - today) / (1000 * 60 * 60 * 24));
      return {
        week,
        daysLeft: daysLeft > 0 ? daysLeft : 0
      };
    }

    function determineTheme(type, gender){
      if (gender === "boy" || gender === "twin_boys") return "boy";
      if (gender === "girl" || gender === "twin_girls") return "girl";
      if (type === "twins" || gender === "twin_mixed") return "twin";
      return "neutral";
    }

    function applyTheme(theme){
      document.body.classList.remove("theme-boy","theme-girl","theme-twin");
      if (theme === "boy") document.body.classList.add("theme-boy");
      if (theme === "girl") document.body.classList.add("theme-girl");
      if (theme === "twin") document.body.classList.add("theme-twin");
    }

    function getThemeText(theme){
      if (theme === "boy") return t().themeBoy;
      if (theme === "girl") return t().themeGirl;
      if (theme === "twin") return t().themeTwin;
      return t().themeNeutral;
    }

    function updateGenderOptions(){
      const type = document.getElementById("pregnancyType").value;
      const select = document.getElementById("babyGender");

      Array.from(select.options).forEach(option => {
        const kind = option.dataset.kind;
        option.hidden = !(kind === "both" || kind === type);
      });

      if (select.selectedOptions[0]?.hidden) {
        select.value = "unknown";
      }

      previewTheme();
    }

    function previewTheme(){
      const type = document.getElementById("pregnancyType").value;
      const gender = document.getElementById("babyGender").value;
      const theme = determineTheme(type, gender);

      applyTheme(theme);
      document.getElementById("themeBox").textContent = `${t().theme}: ${getThemeText(theme)}`;
    }

    function updateSummary(){
      const dueDateValue = document.getElementById("dueDateInput").value;
      const city = document.getElementById("cityInput").value || "-";
      const baby = document.getElementById("babyName").value || "-";
      const type = document.getElementById("pregnancyType").value;
      const gender = document.getElementById("babyGender").value;
      const theme = determineTheme(type, gender);

      let text = `${baby} · ${city} · ${t().theme}: ${getThemeText(theme)}`;

      if (dueDateValue) {
        const result = calculatePregnancy(parseLocalDate(dueDateValue));
        text += ` · ${t().week} ${result.week} · ${result.daysLeft} ${t().daysLeft}`;
      }

      document.getElementById("summaryBox").textContent = text;
      previewTheme();
    }

    function profileLanguageChanged(){
      setLanguage(document.getElementById("languageInput").value);
    }

    async function loadApp(){
      const { data, error } = await supabaseClient.auth.getSession();

      if (error || !data.session) {
        document.getElementById("loginMessage").style.display = "block";
        document.getElementById("appShell").style.display = "none";
        return;
      }

      currentUser = data.session.user;
      document.getElementById("emailBox").textContent = currentUser.email || "-";

      const { data: profiles, error: profileError } = await supabaseClient
        .from("pregnancy_profiles")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending:false })
        .limit(1);

      if (profileError || !profiles || profiles.length === 0) {
        window.location.href = "index.html?reason=no_profile";
        return;
      }

      currentProfile = profiles[0];
      currentLang = localStorage.getItem("mama_lang") || currentProfile.language || "de";

      document.getElementById("fullName").value = currentProfile.full_name || "";
      document.getElementById("cityInput").value = currentProfile.city || "";
      document.getElementById("languageInput").value = currentLang;
      document.getElementById("babyName").value = currentProfile.baby_name || "";
      document.getElementById("dueDateInput").value = currentProfile.due_date || "";
      document.getElementById("pregnancyType").value = currentProfile.pregnancy_type || "singleton";
      document.getElementById("babyGender").value = currentProfile.baby_gender || "unknown";

      applyTheme(
        currentProfile.theme_mode ||
        determineTheme(currentProfile.pregnancy_type, currentProfile.baby_gender)
      );

      document.getElementById("loginMessage").style.display = "none";
      document.getElementById("appShell").style.display = "block";

      setLanguage(currentLang);
      updateGenderOptions();
      updateSummary();
    }

    async function saveProfile(){
      const city = document.getElementById("cityInput").value.trim();
      const dueDate = document.getElementById("dueDateInput").value;

      if (!city || !dueDate) {
        showMessage("error", t().missing);
        return;
      }

      const pregnancyType = document.getElementById("pregnancyType").value;
      const babyGender = document.getElementById("babyGender").value;
      const theme = determineTheme(pregnancyType, babyGender);
      const pregnancy = calculatePregnancy(parseLocalDate(dueDate));

      const payload = {
        full_name:document.getElementById("fullName").value.trim(),
        city,
        language:document.getElementById("languageInput").value,
        baby_name:document.getElementById("babyName").value.trim(),
        due_date:dueDate,
        pregnancy_week:pregnancy.week,
        pregnancy_type:pregnancyType,
        baby_gender:babyGender,
        theme_mode:theme,
        updated_at:new Date().toISOString()
      };

      const { error } = await supabaseClient
        .from("pregnancy_profiles")
        .update(payload)
        .eq("id", currentProfile.id)
        .eq("user_id", currentUser.id);

      if (error) {
        showMessage("error", error.message);
        return;
      }

      currentProfile = {
        ...currentProfile,
        ...payload
      };

      currentLang = payload.language;
      localStorage.setItem("mama_lang", currentLang);

      applyTheme(theme);
      setLanguage(currentLang);
      showMessage("success", t().saved);
    }

    async function signOut(){
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }

    loadApp();
  </script>
</body>
</html>
