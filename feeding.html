<style>
:root{
  --page:#f8f3ec;--card:#fff;--cream:#fffaf4;--soft:#f3eadf;--brown:#4a3428;
  --light:#9b7357;--text:#2f2621;--muted:#7b6a60;--border:#eadfd2;
  --danger:#b45b48;--success:#5f8d63;--warning:#b47a2b;--blue:#4f7ea3;--shadow:rgba(74,52,40,.12);
}
body.theme-boy{--page:#eef7ff;--cream:#f7fbff;--soft:#e8f4ff;--brown:#244b6b;--light:#5f93bd;--text:#1d3347;--muted:#5c7285;--border:#d6e8f7;--shadow:rgba(36,75,107,.12)}
body.theme-girl{--page:#fff1f5;--cream:#fff8fa;--soft:#fde8ef;--brown:#7a3d55;--light:#c47a98;--text:#3d2430;--muted:#7b6070;--border:#f0d4df;--shadow:rgba(122,61,85,.12)}
body.theme-twin{--page:#f1f7ef;--cream:#fbfff8;--soft:#e7f3df;--brown:#3e5c3a;--light:#7ca878;--text:#263522;--muted:#62745f;--border:#dbe9d4;--shadow:rgba(62,92,58,.12)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at 8% 0%,rgba(198,164,106,.22),transparent 30%),radial-gradient(circle at 92% 8%,rgba(155,115,87,.16),transparent 28%),linear-gradient(180deg,#fbf7f1,var(--page));color:var(--text)}
.wrap{max-width:1220px;margin:0 auto;padding:22px 18px 34px}
header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.brand{display:flex;align-items:center;gap:12px;color:var(--brown);font-size:23px;font-weight:950;text-decoration:none;letter-spacing:-.5px}
.brand-icon{width:46px;height:46px;border-radius:18px;background:linear-gradient(135deg,var(--brown),var(--light));color:white;display:flex;align-items:center;justify-content:center;font-weight:950;box-shadow:0 14px 28px var(--shadow)}
.top-actions,.actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.button,.button-light,.button-danger{border:1px solid var(--border);background:white;color:var(--brown);padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:900;text-decoration:none;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.button{background:var(--brown);color:white;border-color:var(--brown)}
.button-danger{background:#fff0ec;color:var(--danger);border-color:#f1c9bf}
.lang-wrap{position:relative}.lang-trigger{min-width:84px}
.lang-menu{position:absolute;right:0;top:48px;width:190px;background:white;border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 70px var(--shadow);padding:8px;display:none;z-index:10}
.lang-menu.open{display:block}
.lang-menu button{width:100%;border:0;background:transparent;color:var(--brown);padding:10px 12px;border-radius:14px;font-weight:900;text-align:left;cursor:pointer;font-family:inherit}
.lang-menu button:hover{background:var(--soft)}
.card,.hero,.panel{background:rgba(255,255,255,.94);border:1px solid var(--border);border-radius:30px;padding:24px;box-shadow:0 24px 70px var(--shadow);margin-bottom:18px}
.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;background:linear-gradient(145deg,var(--cream),white 65%,var(--soft));position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-70px;top:-70px;width:210px;height:210px;border-radius:50%;background:rgba(155,115,87,.10)}
.hero-content,.hero-side{position:relative;z-index:1}
.kicker{display:inline-flex;padding:7px 11px;border-radius:99px;background:var(--soft);color:var(--brown);font-weight:950;font-size:12px;margin-bottom:12px}
h1,h2,h3{color:var(--brown);margin:0 0 12px}h1{font-size:40px;letter-spacing:-1.6px;line-height:1.05}h2{font-size:25px;letter-spacing:-.7px}h3{font-size:18px}
p{margin:0;color:var(--muted);line-height:1.6}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.box,.guide-item{background:linear-gradient(180deg,var(--cream),white);border:1px solid var(--border);border-radius:22px;padding:18px}
.badge{display:inline-flex;width:fit-content;padding:7px 10px;border-radius:999px;background:var(--soft);color:var(--brown);font-size:12px;font-weight:950;margin:0 5px 8px 0}
.progress{height:12px;border-radius:99px;background:var(--soft);overflow:hidden;margin-top:12px}.progress div{height:100%;background:linear-gradient(90deg,var(--brown),var(--light));width:0%}
.checkbox-row{display:flex;gap:12px;align-items:flex-start;margin-top:11px;padding:12px;border-radius:17px;border:1px solid var(--border);background:white}
.checkbox-row input{width:18px;height:18px;margin-top:2px;accent-color:var(--brown)}
.soft{padding:14px 16px;border-radius:18px;background:var(--soft);border:1px solid var(--border);color:var(--brown);font-weight:900;margin-top:14px}
textarea{width:100%;min-height:140px;padding:14px;border-radius:18px;border:1px solid var(--border);background:#fffdf9;color:var(--text);font-family:inherit;font-size:15px;resize:vertical}
.login-message{max-width:650px;margin:60px auto;text-align:center}.status{display:none;margin-top:12px;font-weight:900;color:var(--brown)}
.footer-actions{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-top:22px}
@media(max-width:960px){.hero,.grid-2{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.wrap{padding:18px 12px}h1{font-size:31px}.grid{grid-template-columns:1fr}.card,.hero,.panel{padding:20px}.top-actions{width:100%;justify-content:flex-start}}
</style>
</head>

function ui(){return UI[currentLang]||UI.fr}
function content(){return CONTENT[currentLang]||CONTENT.fr}
function toggleLangMenu(){document.getElementById("langMenu").classList.toggle("open")}
document.addEventListener("click",e=>{if(!e.target.closest(".lang-wrap"))document.getElementById("langMenu").classList.remove("open")});

function setLanguage(lang){
  currentLang=lang;
  localStorage.setItem("mama_lang",lang);
  document.documentElement.lang=lang;
  document.body.dir=lang==="ar"?"rtl":"ltr";
  const info=langInfo[lang]||langInfo.fr;
  document.getElementById("langTrigger").textContent=info.flag+" "+info.abbr;
  document.getElementById("langMenu").classList.remove("open");
  render();
}

function parseLocalDate(v){const p=v.split("-").map(Number);return new Date(p[0],p[1]-1,p[2])}
function addDays(d,days){const r=new Date(d);r.setDate(r.getDate()+days);return r}
function calculatePregnancy(dueDateValue){
  if(!dueDateValue)return currentProfile?.pregnancy_week||1;
  const today=new Date();today.setHours(0,0,0,0);
  const due=parseLocalDate(dueDateValue);
  const start=addDays(due,-280);
  let week=Math.floor((today-start)/(1000*60*60*24*7))+1;
  if(week<1)week=1;if(week>60)week=60;
  return week;
}
function determineTheme(type,gender){
  if(gender==="boy"||gender==="twin_boys")return"boy";
  if(gender==="girl"||gender==="twin_girls")return"girl";
  if(type==="twins"||gender==="twin_mixed")return"twin";
  return"neutral";
}
function applyTheme(theme){
  document.body.classList.remove("theme-boy","theme-girl","theme-twin");
  if(theme==="boy")document.body.classList.add("theme-boy");
  if(theme==="girl")document.body.classList.add("theme-girl");
  if(theme==="twin")document.body.classList.add("theme-twin");
}
function stateKey(){return "mama-page-"+PAGE_ID+"-"+(currentUser?currentUser.id:"guest")}
function noteKey(){return "mama-note-"+PAGE_ID+"-"+(currentUser?currentUser.id:"guest")}
function getChecklistState(){try{return JSON.parse(localStorage.getItem(stateKey()))||{}}catch(e){return{}}}
function saveChecklistState(s){localStorage.setItem(stateKey(),JSON.stringify(s))}
function toggleItem(index){
  const s=getChecklistState();s[index]=!s[index];saveChecklistState(s);renderChecklist();
}
function resetChecklist(){saveChecklistState({});renderChecklist()}
function saveNote(){
  localStorage.setItem(noteKey(),document.getElementById("personalNote").value);
  const el=document.getElementById("noteStatus");
  el.textContent=ui().saved;el.style.display="block";
  setTimeout(()=>el.style.display="none",2500);
}
function renderChecklist(){
  const c=content();
  const s=getChecklistState();
  const box=document.getElementById("checklistBox");
  box.innerHTML=(c.checklist||[]).map((item,i)=>`
    <label class="checkbox-row">
      <input type="checkbox" ${s[i]?"checked":""} onchange="toggleItem(${i})">
      <span>${item}</span>
    </label>
  `).join("");
  const total=(c.checklist||[]).length;
  const done=Object.keys(s).filter(k=>s[k]).length;
  document.getElementById("progressText").textContent=done+" / "+total;
  document.getElementById("progressBar").style.width=total?Math.round(done/total*100)+"%":"0%";
}
function render(){
  const u=ui(); const c=content();
  const map={uiProfile:"profile",uiLogout:"logout",uiProgress:"progress",uiDashboard:"dashboard",uiBack:"back",uiImportant:"important",uiChecklist:"checklist",uiGuide:"guide",uiTips:"tips",uiNotes:"notes",uiSaveNote:"saveNote",uiReset:"reset",uiBackBottom:"back",uiLoginTitle:"loginTitle",uiLoginText:"loginText",uiHome:"home"};
  Object.entries(map).forEach(([id,key])=>{const el=document.getElementById(id);if(el)el.textContent=u[key]});
  document.getElementById("pageKicker").textContent=c.kicker;
  document.getElementById("pageTitle").textContent=c.icon+" "+c.title;
  document.getElementById("pageSubtitle").textContent=c.subtitle;
  document.getElementById("profileInfo").textContent=(currentProfile?.city?currentProfile.city+" · ":"")+u.week+" "+currentWeek;
  document.getElementById("cardsGrid").innerHTML=(c.cards||[]).map(card=>`
    <div class="box"><span class="badge">${u.important}</span><h3>${card[0]}</h3><p>${card[1]}</p></div>
  `).join("");
  document.getElementById("timelineGrid").innerHTML=(c.timeline||[]).map(card=>`
    <div class="guide-item"><span class="badge">${u.status}</span><h3>${card[0]}</h3><p>${card[1]}</p></div>
  `).join("");
  document.getElementById("tipsBox").innerHTML=(c.tips||[]).map(x=>`<div class="soft">${x}</div>`).join("");
  document.getElementById("personalNote").placeholder=u.notePlaceholder;
  document.getElementById("personalNote").value=localStorage.getItem(noteKey())||"";
  renderChecklist();
}
async function loadApp(){
  const {data,error}=await supabaseClient.auth.getSession();
  if(error||!data.session){document.getElementById("loginMessage").style.display="block";return}
  currentUser=data.session.user;
  const {data:profiles}=await supabaseClient.from("pregnancy_profiles").select("*").eq("user_id",currentUser.id).order("created_at",{ascending:false}).limit(1);
  currentProfile=(profiles&&profiles[0])?profiles[0]:null;
  currentLang=localStorage.getItem("mama_lang")||(currentProfile&&currentProfile.language)||"fr";
  currentWeek=calculatePregnancy(currentProfile?.due_date);
  if(currentProfile)applyTheme(currentProfile.theme_mode||determineTheme(currentProfile.pregnancy_type,currentProfile.baby_gender));
  document.getElementById("appShell").style.display="block";
  setLanguage(currentLang);
}
async function signOut(){await supabaseClient.auth.signOut();window.location.href="index.html"}
loadApp();
</script>
</body>
