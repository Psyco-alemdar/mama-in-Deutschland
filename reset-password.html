<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Passwort zurücksetzen · Mama in Deutschland</title>

  <style>
    :root {
      --page:#f8f3ec;
      --card:#ffffff;
      --cream:#fffaf4;
      --soft:#f3eadf;
      --brown:#4a3428;
      --brown2:#6f4f3e;
      --light:#9b7357;
      --text:#2f2621;
      --muted:#7b6a60;
      --border:#eadfd2;
      --danger:#b45b48;
      --success:#5f8d63;
      --shadow:rgba(74,52,40,.12);
    }

    * {
      box-sizing:border-box;
    }

    body {
      margin:0;
      min-height:100vh;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      background:
        radial-gradient(circle at 8% 0%,rgba(198,164,106,.18),transparent 32%),
        radial-gradient(circle at 92% 5%,rgba(155,115,87,.12),transparent 30%),
        linear-gradient(180deg,#fbf7f1,var(--page));
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card {
      width:100%;
      max-width:520px;
      background:rgba(255,255,255,.92);
      border:1px solid var(--border);
      border-radius:34px;
      padding:32px;
      box-shadow:0 24px 70px var(--shadow);
    }

    .brand {
      display:inline-flex;
      align-items:center;
      gap:12px;
      font-size:24px;
      font-weight:950;
      color:var(--brown);
      letter-spacing:-.5px;
      margin-bottom:26px;
    }

    .brand::before {
      content:"M";
      width:42px;
      height:42px;
      border-radius:16px;
      background:linear-gradient(135deg,var(--brown),var(--light));
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 12px 26px var(--shadow);
    }

    h1 {
      margin:0 0 12px;
      color:var(--brown);
      font-size:34px;
      line-height:1;
      letter-spacing:-1.4px;
    }

    p {
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:16px;
    }

    label {
      display:block;
      margin-top:18px;
      margin-bottom:7px;
      color:var(--brown);
      font-size:13px;
      font-weight:900;
    }

    input {
      width:100%;
      padding:14px 15px;
      border-radius:16px;
      border:1px solid var(--border);
      background:#fffdf9;
      color:var(--text);
      font-size:15px;
      outline:none;
      transition:.18s ease;
    }

    input:focus {
      border-color:var(--light);
      box-shadow:0 0 0 4px rgba(155,115,87,.12);
    }

    input.error {
      border-color:var(--danger);
      background:#fff7f5;
      box-shadow:0 0 0 4px rgba(180,91,72,.12);
    }

    .button,
    .button-link {
      width:100%;
      margin-top:16px;
      padding:15px;
      border:none;
      border-radius:18px;
      font-size:15px;
      font-weight:950;
      cursor:pointer;
      transition:.18s ease;
    }

    .button {
      background:linear-gradient(135deg,var(--brown),var(--light));
      color:white;
      box-shadow:0 16px 30px var(--shadow);
    }

    .button-link {
      background:transparent;
      color:var(--brown);
      border:1px solid var(--border);
    }

    .button:hover,
    .button-link:hover {
      transform:translateY(-1px);
      opacity:.94;
    }

    .message {
      display:none;
      margin-top:16px;
      padding:13px 14px;
      border-radius:18px;
      font-size:14px;
      font-weight:850;
      line-height:1.5;
    }

    .message.show {
      display:block;
    }

    .message.success {
      background:#e9f4e6;
      color:var(--success);
      border:1px solid #d2e6cf;
    }

    .message.error {
      background:#fff0ec;
      color:var(--danger);
      border:1px solid #f0cdc4;
    }

    .language-buttons {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .language-buttons button {
      border:1px solid var(--border);
      background:white;
      color:var(--brown);
      padding:9px 12px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
    }

    .language-buttons button.active,
    .language-buttons button:hover {
      background:var(--brown);
      color:white;
    }

    @media (max-width:560px) {
      .card {
        padding:24px;
        border-radius:28px;
      }

      h1 {
        font-size:30px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="brand">Mama in Deutschland</div>

    <div class="language-buttons">
      <button id="lang-de" onclick="setLanguage('de')">🇩🇪 Deutsch</button>
      <button id="lang-fr" onclick="setLanguage('fr')">🇫🇷 Français</button>
      <button id="lang-ar" onclick="setLanguage('ar')">🇸🇦 العربية</button>
      <button id="lang-en" onclick="setLanguage('en')">🇬🇧 English</button>
      <button id="lang-tr" onclick="setLanguage('tr')">🇹🇷 Türkçe</button>
      <button id="lang-ru" onclick="setLanguage('ru')">🇷🇺 Русский</button>
      <button id="lang-uk" onclick="setLanguage('uk')">🇺🇦 Українська</button>
    </div>

    <h1 id="title">Neues Passwort</h1>
    <p id="text">
      Gib dein neues Passwort ein. Danach kannst du dich wieder normal einloggen.
    </p>

    <label id="passwordLabel" for="newPassword">Neues Passwort</label>
    <input type="password" id="newPassword" placeholder="Mindestens 6 Zeichen" />

    <label id="confirmLabel" for="confirmPassword">Passwort wiederholen</label>
    <input type="password" id="confirmPassword" placeholder="Passwort wiederholen" />

    <button class="button" onclick="updatePassword()" id="saveButton">
      Passwort speichern
    </button>

    <button class="button-link" onclick="goHome()" id="backButton">
      Zur Startseite
    </button>

    <div class="message" id="message"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://jzhaihiojpcelndexwxv.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp6aGFpaGlvanBjZWxuZGV4d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTcxNjIsImV4cCI6MjA5NzY5MzE2Mn0.kIF2XmcIcf0UCmhVrmX3Zcc9U5_VnoDGHgaSk-iZrjQ";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentLang = localStorage.getItem("mama_lang") || "de";

    const translations = {
      de: {
        title: "Neues Passwort",
        text: "Gib dein neues Passwort ein. Danach kannst du dich wieder normal einloggen.",
        passwordLabel: "Neues Passwort",
        confirmLabel: "Passwort wiederholen",
        saveButton: "Passwort speichern",
        backButton: "Zur Startseite",
        shortPassword: "Das Passwort muss mindestens 6 Zeichen haben.",
        notSame: "Die Passwörter stimmen nicht überein.",
        success: "Passwort wurde gespeichert. Du kannst dich jetzt einloggen.",
        error: "Das Passwort konnte nicht gespeichert werden."
      },
      fr: {
        title: "Nouveau mot de passe",
        text: "Entre ton nouveau mot de passe. Ensuite tu pourras te connecter normalement.",
        passwordLabel: "Nouveau mot de passe",
        confirmLabel: "Répéter le mot de passe",
        saveButton: "Enregistrer le mot de passe",
        backButton: "Retour à l’accueil",
        shortPassword: "Le mot de passe doit contenir au moins 6 caractères.",
        notSame: "Les mots de passe ne correspondent pas.",
        success: "Le mot de passe a été enregistré. Tu peux maintenant te connecter.",
        error: "Le mot de passe n’a pas pu être enregistré."
      },
      ar: {
        title: "كلمة مرور جديدة",
        text: "اكتبي كلمة المرور الجديدة. بعد ذلك يمكنك تسجيل الدخول بشكل عادي.",
        passwordLabel: "كلمة المرور الجديدة",
        confirmLabel: "إعادة كلمة المرور",
        saveButton: "حفظ كلمة المرور",
        backButton: "العودة إلى الصفحة الرئيسية",
        shortPassword: "كلمة المرور يجب أن تحتوي على 6 أحرف على الأقل.",
        notSame: "كلمتا المرور غير متطابقتين.",
        success: "تم حفظ كلمة المرور. يمكنك الآن تسجيل الدخول.",
        error: "تعذر حفظ كلمة المرور."
      },
      en: {
        title: "New password",
        text: "Enter your new password. After that, you can log in normally.",
        passwordLabel: "New password",
        confirmLabel: "Repeat password",
        saveButton: "Save password",
        backButton: "Go to homepage",
        shortPassword: "Password must be at least 6 characters.",
        notSame: "Passwords do not match.",
        success: "Password saved. You can now log in.",
        error: "Password could not be saved."
      },
      tr: {
        title: "Yeni şifre",
        text: "Yeni şifreni gir. Sonra normal şekilde giriş yapabilirsin.",
        passwordLabel: "Yeni şifre",
        confirmLabel: "Şifreyi tekrar yaz",
        saveButton: "Şifreyi kaydet",
        backButton: "Ana sayfaya dön",
        shortPassword: "Şifre en az 6 karakter olmalı.",
        notSame: "Şifreler aynı değil.",
        success: "Şifre kaydedildi. Şimdi giriş yapabilirsin.",
        error: "Şifre kaydedilemedi."
      },
      ru: {
        title: "Новый пароль",
        text: "Введите новый пароль. После этого вы сможете войти снова.",
        passwordLabel: "Новый пароль",
        confirmLabel: "Повторите пароль",
        saveButton: "Сохранить пароль",
        backButton: "На главную",
        shortPassword: "Пароль должен быть не менее 6 символов.",
        notSame: "Пароли не совпадают.",
        success: "Пароль сохранён. Теперь можно войти.",
        error: "Не удалось сохранить пароль."
      },
      uk: {
        title: "Новий пароль",
        text: "Введіть новий пароль. Після цього ви зможете увійти знову.",
        passwordLabel: "Новий пароль",
        confirmLabel: "Повторіть пароль",
        saveButton: "Зберегти пароль",
        backButton: "На головну",
        shortPassword: "Пароль має містити щонайменше 6 символів.",
        notSame: "Паролі не збігаються.",
        success: "Пароль збережено. Тепер можна увійти.",
        error: "Не вдалося зберегти пароль."
      }
    };

    function t() {
      return translations[currentLang] || translations.de;
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem("mama_lang", lang);

      document.documentElement.lang = lang;
      document.body.dir = lang === "ar" ? "rtl" : "ltr";

      document.querySelectorAll(".language-buttons button").forEach(btn => {
        btn.classList.remove("active");
      });

      const activeButton = document.getElementById(`lang-${lang}`);
      if (activeButton) activeButton.classList.add("active");

      const tr = t();

      document.getElementById("title").textContent = tr.title;
      document.getElementById("text").textContent = tr.text;
      document.getElementById("passwordLabel").textContent = tr.passwordLabel;
      document.getElementById("confirmLabel").textContent = tr.confirmLabel;
      document.getElementById("saveButton").textContent = tr.saveButton;
      document.getElementById("backButton").textContent = tr.backButton;
    }

    function showMessage(type, text) {
      const box = document.getElementById("message");
      box.className = `message show ${type}`;
      box.textContent = text;
    }

    function clearErrors() {
      document.getElementById("newPassword").classList.remove("error");
      document.getElementById("confirmPassword").classList.remove("error");
    }

    async function updatePassword() {
      clearErrors();

      const tr = t();
      const password = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;

      if (!password || password.length < 6) {
        document.getElementById("newPassword").classList.add("error");
        showMessage("error", tr.shortPassword);
        return;
      }

      if (password !== confirm) {
        document.getElementById("newPassword").classList.add("error");
        document.getElementById("confirmPassword").classList.add("error");
        showMessage("error", tr.notSame);
        return;
      }

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        showMessage("error", tr.error + " " + error.message);
        return;
      }

      showMessage("success", tr.success);

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1600);
    }

    function goHome() {
      window.location.href = "index.html";
    }

    setLanguage(currentLang);
  </script>
</body>
</html>
